{{ define "main" }}
<div class="page">
	{{ partial "header.html" . }}
	<article class="content">
		<h1>{{ .Title }}</h1>
		{{ .Content }}
		<ul class="post-list">
			{{ range (.Paginate .Pages).Pages }}
			<li>
				<time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
				<a href="{{ .Permalink }}">{{ .Title }}</a>
			</li>
			{{ end }}
		</ul>
		{{ template "_internal/pagination.html" . }}
	</article>
	{{ partial "footer.html" . }}
</div>
{{ end }}
