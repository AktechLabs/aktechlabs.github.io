<svg width="1240" height="770" viewBox="0 0 1240 770" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg{fill:#FFF}
    .title{fill:#1A1A1A;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:700}
    .mono{fill:#1A1A1A;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:700}
    .monocap{fill:#4A4A4A;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .name{fill:#1A1A1A;font-family:Charter,Georgia,serif;font-weight:700}
    .cap{fill:#4A4A4A;font-family:Charter,Georgia,serif}
    .leg{fill:#2A2A2A;font-family:Charter,Georgia,serif}
    .tile-green{fill:#E9F6EC;stroke:#43A047;stroke-width:1.5}
    .tile-blue{fill:#E8F1FC;stroke:#6FA8DC;stroke-width:1.5}
    .tile-ext{fill:#FFF;stroke:#909090;stroke-width:1.25}
    .group{fill:#F6F6F6;stroke:#ABABAB;stroke-width:1.25;stroke-dasharray:5 4}
    .subgroup{fill:#FCFCFC;stroke:#ABABAB;stroke-width:1;stroke-dasharray:4 3}
    .a-green{fill:none;stroke:#43A047;stroke-width:1.5}
    .a-gray{fill:none;stroke:#8A8A8A;stroke-width:1.25}
    .albl-g{fill:#1B5E20;font-family:Charter,Georgia,serif;font-style:italic}
    .albl-gr{fill:#5A5A5A;font-family:Charter,Georgia,serif;font-style:italic}
  </style>
  <rect class="bg" width="1240" height="770"/>

  <defs>
    <marker id="ah-green" markerWidth="8" markerHeight="8" refX="7" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 4 L0 8 Z" fill="#43A047"/>
    </marker>
    <marker id="ah-gray" markerWidth="8" markerHeight="8" refX="7" refY="4"
            orient="auto" markerUnits="strokeWidth">
      <path d="M0 0 L7 4 L0 8 Z" fill="#8A8A8A"/>
    </marker>
  </defs>

  <!-- Title + legend -->
  <text class="title" x="60" y="60" font-size="26">ai-sandbox</text>
  <text class="cap" x="248" y="58" font-size="13.5">the CLI is <tspan font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-weight="700" fill="#1A1A1A">psb</tspan>, short for &#8220;pi sandbox&#8221;</text>

  <rect class="tile-blue" x="60" y="96" width="20" height="20" rx="6"/>
  <text class="leg" x="92" y="111" font-size="13">lives on your laptop</text>

  <rect class="tile-green" x="60" y="124" width="20" height="20" rx="6"/>
  <text class="leg" x="92" y="139" font-size="13">inside the per-project container</text>

  <line class="a-green" x1="60" y1="162" x2="82" y2="162" marker-end="url(#ah-green)"/>
  <text class="leg" x="92" y="166" font-size="13">data crossing the boundary: bind mounts, published ports</text>

  <line class="a-gray" x1="60" y1="190" x2="82" y2="190" marker-end="url(#ah-gray)"/>
  <text class="leg" x="92" y="194" font-size="13">control: psb reads the config, creates and enters the container</text>

  <!-- Host group -->
  <rect class="group" x="60" y="220" width="400" height="500" rx="16"/>
  <text class="cap" x="84" y="246" font-size="13.5">host · your laptop</text>

  <g>
    <rect class="tile-blue" x="92" y="266" width="336" height="58" rx="10"/>
    <text class="mono" x="260" y="291" font-size="14" text-anchor="middle">~/dev/my-project</text>
    <text class="cap" x="260" y="312" font-size="12" text-anchor="middle">your project directory</text>
  </g>
  <g>
    <rect class="tile-blue" x="92" y="344" width="336" height="58" rx="10"/>
    <text class="mono" x="260" y="369" font-size="14" text-anchor="middle">config.json</text>
    <text class="cap" x="260" y="390" font-size="12" text-anchor="middle">mounts · ports · memory · cpus</text>
  </g>
  <g>
    <rect class="tile-ext" x="92" y="422" width="336" height="58" rx="10"/>
    <text class="name" x="260" y="447" font-size="15" text-anchor="middle">Everything else in $HOME</text>
    <text class="cap" x="260" y="468" font-size="12" text-anchor="middle">never mounted · invisible to the agent</text>
  </g>
  <g>
    <rect class="tile-blue" x="92" y="560" width="336" height="58" rx="10"/>
    <text class="name" x="260" y="585" font-size="15" text-anchor="middle">Browser</text>
    <text class="monocap" x="260" y="606" font-size="12" text-anchor="middle">localhost:3000</text>
  </g>

  <!-- psb trapezoid -->
  <path class="tile-green" d="M515 330 L685 330 L655 398 L545 398 Z"/>
  <text class="mono" x="600" y="360" font-size="16" text-anchor="middle">psb</text>
  <text class="cap" x="600" y="381" font-size="12.5" text-anchor="middle">sandbox CLI</text>

  <!-- Container group -->
  <rect class="group" x="740" y="220" width="440" height="500" rx="16"/>
  <text class="cap" x="764" y="246" font-size="13.5">container · one per project</text>

  <!-- bind-mounted views sub-group -->
  <rect class="subgroup" x="762" y="258" width="396" height="146" rx="12"/>
  <g>
    <rect class="tile-green" x="782" y="270" width="356" height="46" rx="9"/>
    <text class="mono" x="960" y="289" font-size="13" text-anchor="middle">~/dev/my-project</text>
    <text class="cap" x="960" y="307" font-size="11" text-anchor="middle">read/write</text>
  </g>
  <g>
    <rect class="tile-green" x="782" y="326" width="356" height="46" rx="9"/>
    <text class="mono" x="960" y="345" font-size="13" text-anchor="middle">~/.gitconfig · settings.json</text>
    <text class="cap" x="960" y="363" font-size="11" text-anchor="middle">whatever config.json lists</text>
  </g>
  <text class="cap" x="960" y="392" font-size="12" text-anchor="middle">bind-mounted host paths</text>

  <!-- agents -->
  <g>
    <rect class="tile-green" x="782" y="434" width="180" height="58" rx="10"/>
    <text class="mono" x="872" y="459" font-size="14" text-anchor="middle">claude</text>
    <text class="cap" x="872" y="480" font-size="12" text-anchor="middle">Claude Code</text>
  </g>
  <g>
    <rect class="tile-green" x="982" y="434" width="156" height="58" rx="10"/>
    <text class="mono" x="1060" y="459" font-size="14" text-anchor="middle">pi</text>
    <text class="cap" x="1060" y="480" font-size="12" text-anchor="middle">AI agent</text>
  </g>

  <!-- toolchain token row -->
  <g>
    <rect class="tile-green" x="782" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="808" y="541" font-size="11" text-anchor="middle">node</text>
    <rect class="tile-green" x="843" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="869" y="541" font-size="11" text-anchor="middle">go</text>
    <rect class="tile-green" x="904" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="930" y="541" font-size="11" text-anchor="middle">uv</text>
    <rect class="tile-green" x="965" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="991" y="541" font-size="11" text-anchor="middle">pixi</text>
    <rect class="tile-green" x="1026" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="1052" y="541" font-size="11" text-anchor="middle">git</text>
    <rect class="tile-green" x="1087" y="520" width="52" height="34" rx="8"/>
    <text class="mono" x="1113" y="541" font-size="11" text-anchor="middle">zsh</text>
  </g>
  <text class="cap" x="960" y="580" font-size="12" text-anchor="middle">preinstalled toolchain</text>

  <!-- dev server -->
  <g>
    <rect class="tile-green" x="782" y="600" width="190" height="52" rx="10"/>
    <text class="name" x="877" y="623" font-size="15" text-anchor="middle">Dev server</text>
    <text class="monocap" x="877" y="644" font-size="12" text-anchor="middle">:3000</text>
  </g>

  <text class="cap" x="782" y="692" font-size="12">runs as your UID · files stay writable on the host</text>

  <!-- Arrows -->
  <!-- bind mount: project dir -> mounted view -->
  <path class="a-green" d="M428 295 C 560 295, 660 293, 782 293" marker-end="url(#ah-green)"/>
  <text class="albl-g" x="600" y="281" font-size="13" text-anchor="middle">bind mount</text>

  <!-- config -> psb -->
  <path class="a-gray" d="M428 373 L513 366" marker-end="url(#ah-gray)"/>
  <text class="albl-gr" x="468" y="352" font-size="13" text-anchor="middle">reads</text>

  <!-- psb -> container -->
  <path class="a-gray" d="M672 364 L738 364" marker-end="url(#ah-gray)"/>

  <!-- dev server -> browser (published port) -->
  <path class="a-green" d="M782 626 C 660 626, 560 589, 428 589" marker-end="url(#ah-green)"/>
  <text class="albl-g" x="600" y="645" font-size="13" text-anchor="middle">published port 3000:3000</text>
</svg>
