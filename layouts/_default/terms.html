{{ define "main" }}
<div class="page">
	{{ partial "header.html" . }}
	<article class="content">
		<h1>{{ .Title }}</h1>
		<ul class="term-list">
			{{ range .Data.Terms.Alphabetical }}
			<li><a href="{{ .Page.Permalink }}">{{ .Page.Title }}</a> <span>({{ .Count }})</span></li>
			{{ end }}
		</ul>
	</article>
	{{ partial "footer.html" . }}
</div>
{{ end }}
